{% extends "base.html" %}
{% block content %}
  {% if error %}
    <div class="card" style="border-color: var(--danger); color: var(--danger);">
      {{ error }}
    </div>
  {% endif %}
  <form class="card" action="{{ url_for('predict') }}" method="post"
        enctype="multipart/form-data">
    <label for="mri" style="display:block; margin-bottom:10px; font-weight:600;">
      Examen IRM / DBT
    </label>
    <input id="mri" name="mri" type="file"
           accept=".npz,.dcm,.dicom,.nii,.gz,.png,.jpg,.jpeg"
           style="width:100%; padding:12px; background:#0f1117; color:var(--fg);
                  border:1px dashed var(--border); border-radius:10px;" required>
    <p style="color:var(--muted); font-size:.8rem; margin:10px 0 18px;">
      Formats acceptés : .npz (volume prétraité), DICOM (.dcm), NIfTI (.nii/.nii.gz) ou une image.
    </p>
    <button type="submit"
            style="background:var(--accent); color:#0b0d12; border:0; font-weight:700;
                   padding:12px 20px; border-radius:10px; cursor:pointer; font-size:1rem;">
      Analyser
    </button>
  </form>
{% endblock %}
