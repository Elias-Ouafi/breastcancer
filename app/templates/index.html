{% extends "base.html" %}
{% block content %}
  {% if error %}
    <div class="card" style="border-color: var(--danger); color: var(--danger);">
      {{ error }}
    </div>
  {% endif %}
  <form class="card" action="{{ url_for('predict') }}" method="post"
        enctype="multipart/form-data">
    <label for="mri" style="display:block; margin-bottom:var(--sp-3); font-weight:600;">
      Examen IRM / DBT
    </label>
    <input id="mri" name="mri" type="file"
           accept=".npz,.dcm,.dicom,.nii,.gz,.png,.jpg,.jpeg"
           style="width:100%; padding:var(--sp-3); background:var(--surface-2); color:var(--text);
                  font-family:var(--font-body); border:1px dashed var(--border); border-radius:var(--radius-md);"
           required>
    <p class="field-hint">
      Formats acceptés : .npz (volume prétraité), DICOM (.dcm), NIfTI (.nii/.nii.gz) ou une image.
    </p>
    <button type="submit" class="btn-primary">Analyser</button>
  </form>
{% endblock %}
